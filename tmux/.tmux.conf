# Config reload
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Remove ESC delay (for Vim/Neovim)
set -sg escape-time 0

# Prefix key (Ctrl-a)
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Vi mode for copy
set-window-option -g mode-keys vi

# Pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window management
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Popup terminal (prefix + T)
bind T display-popup -E

# Status bar on top
set-option -g status-position top

# Catppuccin Theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "#1e1e2e" # fix rounded window corners
set -g @catppuccin_window_current_number_color "#{@thm_blue}"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text "#[bg=#{@thm_surface_0},fg=#{@thm_blue}] #{b:pane_current_path}"
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}#[bg=default,fg=#{@thm_surface_0}]"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Initialize TPM (must stay at bottom)
run '~/.tmux/plugins/tpm/tpm'

# Status Line
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

# Transparent status bar
# set -g status-style bg=default
